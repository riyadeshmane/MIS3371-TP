<!DOCTYPE html>
<!--
    Program name: hw3.html
    Author: Riya Deshmane

    Version: 1.0
    Description: Patient registration form for Mouse Pediatrics clinic.

<html lang="en">
<head>
    <link rel="stylesheet" href="hw3.css">
    <title>New Patient Registration | Mouse Pediatric Clinic</title>
</head>
<body>

<!-- Header begins here -->
<header>
    <table width="100%">
        <tr>
            <td align="left" valign="middle" width="20%">
                <img src="cliniclogo1.png" alt="Mouse Pediatrics Logo" width="70px" id="logo"/>
            </td>
            <td align="center" valign="middle">
                <h2>Mouse Pediatrics</h2>
            </td>
            <td align="right" valign="middle" width="20%">
                <p id="today">Today's Date: <span id="dateDisplay"></span></p>
            </td>
        </tr>
    </table>
</header>

<hr>

<!--FORM -->
<form action="thankyou.html">
    <table class="form-table" cellspacing="0" cellpadding="5">

        <tr>
            <th colspan="2">Create Patient Account Portal</th>
        </tr>

        <tr>
            <td class="label-col"><label for="fname">First Name:</label></td>
            <td><input type="text" 
                id="fname" 
                name="fname" 
                maxlength="30" 
                title="Letter, apostrophes, and dashes only"
                pattern="[a-zA-Z']{1,30}" 
                onblur="validateFname()" 
                required 
                placeholder="First Name"/>
                <br>
                <span class="error" id="fname-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="minitial">Middle Initial:</label></td>
            <td><input type="text" 
                id="minitial" 
                name="minitial" 
                maxlength="1" 
                title="Letters only"
                pattern="[a-zA-Z']{0,1}"
                onblur="validateMinitial()"
                placeholder="M"
                />
                <br>
                <span class="error" id="minitial-error"></span> 
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="lname">Last Name:</label></td>
            <td><input type="text" 
                id="lname" 
                name="lname" 
                maxlength="30" 
                required 
                title="Letter, apostrophes, and dashes only"
                pattern="[a-zA-Z']{1,30}"
                onblur="validateLname()"
                placeholder="Last Name"
                />
                <br>
                <span class="error" id="lname-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label>Gender:</label></td>
            <td>
                <input type="radio" id="g1" name="gender" value="Male"> <label for="g1">Male</label>&nbsp;
                <input type="radio" id="g2" name="gender" value="Female"> <label for="g2">Female</label>&nbsp;
                <input type="radio" id="g3" name="gender" value="Other"> <label for="g3">Other</label>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="dob">Date of Birth:</label></td>
            <td><input type="date" 
                id="dob" 
                name="dob" 
                onblur="validateDob()"
                required
                />
                <br>
                <span class="error" id="dob-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="email">Email:</label></td>
            <td><input type="email" 
                name="email" 
                id="email"
                maxlength="30" 
                required 
                title="Please enter your email"
                placeholder="name@domain.com"
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
                onblur="validateEmail()"
                />
                <br>
                <span class="error" id="email-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="ssn">SSN:</label></td>
            <td><input type="password" 
                id="ssn" 
                name="ssn" 
                minlength="9" 
                maxlength="11" 
                required 
                title="Numbers only"
                placeholder="123-45-6789"
                onblur="validateSsn()"
                />
                <br>
                <span class="error" id="ssn-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="phonenum">Phone Number:</label></td>
            <td><input type="text" 
                id="phonenum" 
                name="phonenum" 
                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                required 
                maxlength = "30"
                titel = "Please enter your phone number" 
                required
                placeholder="123-456-7890"
                onblur="validatePhone()"
                />
                <br>
                <span class="error" id="phonenum-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label>Vaccinated?</label></td>
            <td>
                <input type="radio" id="vax1" name="vaccinated" value="Yes"> <label for="vax1">Yes</label>&nbsp;
                <input type="radio" id="vax2" name="vaccinated" value="No"> <label for="vax2">No</label>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label>Has Insurance?</label></td>
            <td>
                <input type="radio" id="ins1" name="insurance" value="Yes"> <label for="ins1">Yes</label>&nbsp;
                <input type="radio" id="ins2" name="insurance" value="No"> <label for="ins2">No</label>
            </td>
        </tr>

        <tr><td colspan="2"><hr></td></tr>

        <tr>
            <th colspan="2">Patient's Contact Information</th>
        </tr>

        <tr>
            <td class="label-col"><label for="address1">Address:</label></td>
            <td><input type="text" 
                id="address1" 
                name="address1" 
                maxlength="30" 
                required 
                title="Please enter your address"
                placeholder="1234 Mousey Lane"
                onblur="validateAddress1()"
                />
                <br>
                <span class="error" id="address1-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="address2">Address 2:</label></td>
            <td><input type="text" 
                id="address2" 
                name="address2" 
                maxlength="30" 
                placeholder="Suite 123">
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="city">City:</label></td>
            <td><input type="text" 
                id="city" 
                name="city" 
                maxlength="30" 
                required 
                placeholder="Houston"
                onblur="validateCity()"
                />
                <br>
                <span class="error" id="city-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="state">State:</label></td>
            <td>
                <select id="state" name="state" required>
                    <option selected disabled>Please Select One</option>
                    <option value="AL">Alabama</option><option value="AK">Alaska</option>
                    <option value="AZ">Arizona</option><option value="AR">Arkansas</option>
                    <option value="CA">California</option><option value="CO">Colorado</option>
                    <option value="CT">Connecticut</option><option value="DE">Delaware</option>
                    <option value="DC">District of Columbia</option><option value="FL">Florida</option>
                    <option value="GA">Georgia</option><option value="GU">Guam</option>
                    <option value="HI">Hawaii</option><option value="ID">Idaho</option>
                    <option value="IL">Illinois</option><option value="IN">Indiana</option>
                    <option value="IA">Iowa</option><option value="KS">Kansas</option>
                    <option value="KY">Kentucky</option><option value="LA">Louisiana</option>
                    <option value="ME">Maine</option><option value="MD">Maryland</option>
                    <option value="MA">Massachusetts</option><option value="MI">Michigan</option>
                    <option value="MN">Minnesota</option><option value="MS">Mississippi</option>
                    <option value="MO">Missouri</option><option value="MT">Montana</option>
                    <option value="NE">Nebraska</option><option value="NV">Nevada</option>
                    <option value="NH">New Hampshire</option><option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option><option value="NY">New York</option>
                    <option value="NC">North Carolina</option><option value="ND">North Dakota</option>
                    <option value="OH">Ohio</option><option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option><option value="PA">Pennsylvania</option>
                    <option value="PR">Puerto Rico</option><option value="RI">Rhode Island</option>
                    <option value="SC">South Carolina</option><option value="SD">South Dakota</option>
                    <option value="TN">Tennessee</option><option value="TX">Texas</option>
                    <option value="UT">Utah</option><option value="VT">Vermont</option>
                    <option value="VA">Virginia</option><option value="WA">Washington</option>
                    <option value="WV">West Virginia</option><option value="WI">Wisconsin</option>
                    <option value="WY">Wyoming</option>
                </select>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="zipcode">Zip Code:</label></td>
            <td><input type="text" 
                id="zipcode" 
                name="zipcode" 
                minlength="5" 
                maxlength="10" 
                required 
                title="Numbers and a dash only"
                placeholder="77001"
                pattern="^\d{5}(-\d{4})?$"
                onblur="validateZipcode()"
                />
                <br>
                <span class="error" id="zipcode-error"></span>
            </td>
        </tr>

        <tr><td colspan="2"><hr></td></tr>

        <tr>
            <th colspan="2">Patient's Medical History</th>
        </tr>

        <tr>
            <td class="label-col"><label>Has the patient had:</label></td>
            <td>
                <input type="checkbox" id="cb1" name="history" value="Asthma"> <label for="cb1">Asthma</label>
                <input type="checkbox" id="cb2" name="history" value="Allergies"> <label for="cb2">Allergies</label>
                <input type="checkbox" id="cb3" name="history" value="Pneumonia"> <label for="cb3">Pneumonia</label>
                <input type="checkbox" id="cb4" name="history" value="Seizures"> <label for="cb4">Seizures</label>
                <input type="checkbox" id="cb5" name="history" value="Anemia"> <label for="cb5">Anemia</label>
                <input type="checkbox" id="cb6" name="history" value="Broken Bone"> <label for="cb6">Broken Bone</label>
                <input type="checkbox" id="cb7" name="history" value="Other"> <label for="cb7">Other</label>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="notes">Additional Notes:</label></td>
            <td><textarea id="notes" name="notes" rows="4" cols="50" placeholder="Describe current symptoms or other medical history..."></textarea></td>
        </tr>

        <tr>
            <td class="label-col"><label for="range">Symptom Severity (1-10):</label></td>
            <td>
                <input type="range" id="range" name="range" min="1" max="10" value="1">
                <span id="range-slider">1</span>
            </td>
        </tr>

        <tr><td colspan="2"><hr></td></tr>

        <tr>
            <th colspan="2">Finish Patient Portal Registration</th>
        </tr>

        <tr>
            <td class="label-col"><label for="username">Username:</label></td>
            <td><input type="text" 
                id="username" 
                name="username" 
                minlength="5"
                maxlength="20" 
                title="Username must contain at least 5 characters and it cannot start with a number"
                required placeholder="user123"
                onblur="validateUsername()"
                />
                <br>
                <span class="error" id="username-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="password">Password:</label></td>
            <td><input type="password" 
                id="password" 
                name="password" 
                minlength="8" 
                maxlength="30" 
                required 
                title = "Password must contain at least 10 characters, one uppercase, one number, one lowercase letter, and one special character."
                placeholder="Required"
                onblur="validatePassword()"
                oninput="validatePassword()"
                onfocus="validatePassword()"
                />
                <br>
                <span class="error" id="password1-error"></span>
            </td>
        </tr>

        <tr>
            <td class="label-col"><label for="confirmpass">Confirm Password:</label></td>
            <td><input type="password" 
                id="confirmpass" 
                name="confirmpass" 
                minlength="8" 
                maxlength="30" 
                required 
                title="Please re-enter your password"
                placeholder="Required"
                onblur="confirmPassword()"
                oninput="confirmPassword()"
                onfocus="confirmPassword()"
                />
                <br>
                <span class="error" id="password2-error"></span>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="btn-row" style="padding-top:14px;">
                <input type="reset" value="Clear and Start Over">
                &nbsp;&nbsp;
                <input type="submit" value="Submit" id="submit" style="display:none;">
                &nbsp;&nbsp;
                <input type="button" name="review" id="review" value="Review" onclick="reviewInput()">
                &nbsp;&nbsp;
                <input type="button" name="validate" id="validate" value="Validate" onclick="validateEverything()">
            </td>
        </tr>

    </table>
<div class="pword-message">
    <span id="msg1"></span> <br/>
    <span id="msg2"></span> <br/>
    <span id="msg3"></span> <br/>
    <span id="msg4"></span> <br/>
    <span id="msg5"></span> <br/>
    <span id="msg6"></span> <br/>
    <span id="msg7"></span> <br/>
    <span id="pass2-errors"></span> <br/>
</div>

<center>
    <p id="showInput"></p>
</center>
</form>

<!--Footer begins here-->
<footer>
    <p id="footer">&#169; 2026 Mouse Pediatrics &nbsp;|&nbsp; <a href="mailto:contact@mousepediatrics.com" target="_blank" rel="noopener noreferrer">Contact Us!</a></p>
</footer>


<div id="alert-box">
    <div id="alert-content">
        <h4>Please fill out all required fields. </h4>
        <button id="close-alert" type="button">OK</button>
    </div>
</div>

    <script src="hw3.js"></script>

</body>
</html>
